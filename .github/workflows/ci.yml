name: CI — Lint & Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── Frontend ──────────────────────────────────────────────────────────────
  frontend:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: https://api.iscev.com.tr/api/v1
          VITE_UPLOADS_URL:  https://api.iscev.com.tr

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        if: github.ref == 'refs/heads/main'
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7

  # ─── Backend ───────────────────────────────────────────────────────────────
  backend:
    name: Backend Lint & Health
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Syntax check
        run: node --check server.js app.js

      - name: Unit & Integration Tests
        run: npm test
        env:
          NODE_ENV: test
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'ci-test-secret-key-32-chars-long!!' }}

  # ─── Docker Build (sadece main branch) ────────────────────────────────────
  docker:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t iscev-api ./backend

      - name: Build frontend image
        run: docker build -t iscev-web ./frontend
        env:
          VITE_API_BASE_URL: https://api.iscev.com.tr/api/v1
          VITE_UPLOADS_URL:  https://api.iscev.com.tr
