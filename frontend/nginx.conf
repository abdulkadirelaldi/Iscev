server {
    listen 80;
    server_name iscevaritma.com.tr www.iscevaritma.com.tr;

    # Let's Encrypt doğrulama
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # HTTP → HTTPS yönlendirme
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name iscevaritma.com.tr www.iscevaritma.com.tr;

    root /usr/share/nginx/html;
    index index.html;

    # SSL sertifikaları (certbot volume'dan gelir)
    ssl_certificate     /etc/letsencrypt/live/iscevaritma.com.tr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/iscevaritma.com.tr/privkey.pem;

    # Güvenli SSL ayarları
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_stapling              on;
    ssl_stapling_verify       on;

    # HSTS (1 yıl)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Gzip sıkıştırma
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml font/woff2;
    gzip_min_length 1000;

    # SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Statik dosyalar için agresif cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /robots.txt {
        expires 1d;
        add_header Cache-Control "public";
    }

    # Dinamik sitemap — backend'den üretilir
    location = /sitemap.xml {
        proxy_pass http://backend:5001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        add_header Cache-Control "public, max-age=3600";
    }

    # API proxy
    location /api/ {
        proxy_pass http://backend:5001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 110M;
        proxy_read_timeout 300s;
    }

    # Statik medya proxy
    location /uploads/ {
        proxy_pass http://backend:5001;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public";
    }
}
